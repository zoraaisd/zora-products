<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1e;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#2d0052;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1428;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#grad3)"/>
  
  <!-- Hexagon pattern -->
  <g stroke="rgba(59, 130, 246, 0.15)" stroke-width="2" fill="none">
    <polygon points="200,100 250,70 300,100 300,170 250,200 200,170"/>
    <polygon points="500,600 550,570 600,600 600,670 550,700 500,670"/>
    <polygon points="1400,200 1450,170 1500,200 1500,270 1450,300 1400,270"/>
    <polygon points="1100,800 1150,770 1200,800 1200,870 1150,900 1100,870"/>
  </g>
  
  <!-- Flowing particles -->
  <g fill="rgba(168, 85, 247, 0.25)">
    <circle cx="200" cy="100" r="5"/>
    <circle cx="500" cy="600" r="6"/>
    <circle cx="1400" cy="200" r="4"/>
    <circle cx="1100" cy="800" r="7"/>
    <circle cx="850" cy="400" r="5"/>
  </g>
  
  <!-- Horizontal accent lines -->
  <g stroke="rgba(34, 211, 238, 0.1)" stroke-width="2">
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
  </g>
</svg>