<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1428;stop-opacity:1" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#grad1)"/>
  
  <!-- Circuit pattern lines -->
  <g stroke="rgba(139, 92, 246, 0.15)" stroke-width="2" fill="none">
    <path d="M 100 200 L 400 200 L 400 500 L 700 500"/>
    <path d="M 1200 100 L 1500 100 L 1500 400 L 1800 400"/>
    <path d="M 300 800 L 600 800 L 600 950"/>
    <path d="M 1100 700 L 1300 700 L 1300 900"/>
  </g>
  
  <!-- Geometric dots -->
  <g fill="rgba(59, 130, 246, 0.2)" filter="url(#blur)">
    <circle cx="100" cy="200" r="8"/>
    <circle cx="400" cy="200" r="8"/>
    <circle cx="400" cy="500" r="8"/>
    <circle cx="1500" cy="100" r="8"/>
    <circle cx="1800" cy="400" r="8"/>
    <circle cx="600" cy="800" r="8"/>
  </g>
  
  <!-- Subtle grid -->
  <g stroke="rgba(168, 85, 247, 0.08)" stroke-width="1">
    <line x1="0" y1="0" x2="1920" y2="1080"/>
    <line x1="1920" y1="0" x2="0" y2="1080"/>
  </g>
</svg>