<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#330033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#grad4)"/>
  
  <!-- Diagonal streaks -->
  <g stroke="rgba(168, 85, 247, 0.15)" stroke-width="3" opacity="0.7">
    <line x1="0" y1="0" x2="400" y2="300"/>
    <line x1="200" y1="0" x2="600" y2="300"/>
    <line x1="1920" y1="0" x2="1520" y2="300"/>
    <line x1="1720" y1="0" x2="1320" y2="300"/>
    <line x1="0" y1="1080" x2="400" y2="780"/>
    <line x1="1920" y1="1080" x2="1520" y2="780"/>
  </g>
  
  <!-- Neon nodes -->
  <g>
    <circle cx="400" cy="300" r="12" fill="rgba(59, 130, 246, 0.4)"/>
    <circle cx="1520" cy="300" r="12" fill="rgba(59, 130, 246, 0.4)"/>
    <circle cx="400" cy="780" r="12" fill="rgba(168, 85, 247, 0.4)"/>
    <circle cx="1520" cy="780" r="12" fill="rgba(168, 85, 247, 0.4)"/>
    <circle cx="960" cy="540" r="14" fill="rgba(34, 211, 238, 0.3)"/>
  </g>
  
  <!-- Connecting lines -->
  <g stroke="rgba(34, 211, 238, 0.12)" stroke-width="1" stroke-dasharray="5,5">
    <line x1="400" y1="300" x2="960" y2="540"/>
    <line x1="1520" y1="300" x2="960" y2="540"/>
    <line x1="400" y1="780" x2="960" y2="540"/>
    <line x1="1520" y1="780" x2="960" y2="540"/>
  </g>
</svg>